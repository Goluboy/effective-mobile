services:
  mongodb:
    image: mongo:7
    container_name: user-service-db
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: user-service
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - user-service-network

  app:
    build: .
    container_name: user-service-app
    restart: unless-stopped
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://mongodb/user-service
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRES_IN: 7d
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    networks:
      - user-service-network

volumes:
  mongodb_data:

networks:
  user-service-network:
    driver: bridge
